<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="upload-container">

  <h1>Secure Document Upload</h1>

  <div class="upload-box">

    <p>Drag & Drop Files</p>

    <input
    type="file"
    id="fileInput"
    />
    <button onclick="uploadFile()">
    Upload & Analyze
    </button>

  </div>

  <div class="guardrails">

    <h2>System Guardrails</h2>

    <ul>
      <li>Defensive analysis only</li>
      <li>Automated misuse detection</li>
      <li>Human escalation for high-risk content</li>
      <li>Audit logging enabled</li>
    </ul>

  </div>

</div>

</body>
</html>
